    <style>
      *,*::before,*::after{box-sizing:border-box}html,body,#root{min-height:100%;margin:0}body{overflow-x:hidden;background:#061014;color:#f5fbff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}a{color:inherit;text-decoration:none}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.home-gateway{position:relative;isolation:isolate;display:grid;min-height:100vh;overflow:hidden;padding:clamp(18px,3vw,34px);color:#f5fbff;background:radial-gradient(circle at 50% 105%,rgba(35,231,239,.18),transparent 34rem),radial-gradient(circle at 25% 42%,rgba(18,103,232,.14),transparent 27rem),radial-gradient(circle at 74% 36%,rgba(53,169,184,.12),transparent 28rem),linear-gradient(135deg,#061014 0%,#071a20 45%,#041014 100%)}.home-gateway::before{position:absolute;inset:0;z-index:-3;content:"";opacity:.5;background-image:linear-gradient(rgba(141,240,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(141,240,255,.035) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(circle at 50% 46%,#000,transparent 76%)}.gateway-motion-bg{position:absolute;inset:0;z-index:-1;pointer-events:none}.gateway-motion-bg span{position:absolute;border:1px solid rgba(141,240,255,.08);border-radius:50%;box-shadow:inset 0 0 48px rgba(105,232,255,.035)}.gateway-motion-bg span:nth-child(1){top:18%;left:26%;width:min(34vw,520px);aspect-ratio:1}.gateway-motion-bg span:nth-child(2){right:23%;bottom:17%;width:min(38vw,580px);aspect-ratio:1}.gateway-motion-bg span:nth-child(3){top:14%;left:50%;width:min(48vw,760px);aspect-ratio:1;transform:translateX(-50%)}.gateway-home-brand{position:absolute;top:clamp(20px,3vw,34px);left:50%;z-index:4;display:inline-flex;align-items:center;justify-content:center;width:clamp(142px,14vw,210px);transform:translateX(-50%)}.gateway-home-brand img{width:100%;height:auto;filter:brightness(0) invert(1) opacity(.9)}.gateway-hero{position:relative;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(18px,3vw,34px);align-self:center;width:min(1180px,100%);min-height:calc(100vh - 68px);margin:0 auto;padding-top:clamp(70px,9vw,110px)}.gateway-column{position:relative;display:grid;align-content:center;justify-items:center;min-height:min(660px,calc(100vh - 150px));padding:clamp(30px,5vw,58px);overflow:hidden;border:1px solid rgba(141,240,255,.1);border-radius:8px;text-align:center;background:radial-gradient(circle at 50% 38%,rgba(105,232,255,.13),transparent 15rem),linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.022));box-shadow:0 28px 90px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(18px)}.gateway-card-visual{position:relative;display:grid;place-items:center;width:118px;height:118px;margin-bottom:28px;border:1px solid rgba(141,240,255,.16);border-radius:50%;color:#8df0ff;background:radial-gradient(circle at 50% 26%,rgba(105,232,255,.24),transparent 58%),rgba(255,255,255,.045);box-shadow:0 0 48px rgba(105,232,255,.12),inset 0 1px 0 rgba(255,255,255,.12)}.gateway-card-visual i{position:absolute;border:1px solid rgba(141,240,255,.16);border-radius:50%}.gateway-card-visual i:first-child{inset:-18px}.gateway-card-visual i:nth-child(2){inset:-36px;opacity:.55}.gateway-copy{position:relative;z-index:2;display:grid;justify-items:center;max-width:560px}.gateway-copy>span{color:#8df0ff;font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase}.gateway-copy h2{max-width:620px;margin:12px 0 0;color:rgba(255,255,255,.98);font-size:clamp(46px,5vw,78px);font-weight:760;letter-spacing:-.055em;line-height:.95}.gateway-copy h2 strong{display:block;color:rgba(213,228,234,.72);font-weight:520}.gateway-copy p{max-width:470px;margin:20px 0 0;color:rgba(219,239,244,.72);font-size:14px;font-weight:650;line-height:1.72}.gateway-primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:48px;margin-top:30px;padding:0 24px;border:1px solid rgba(141,240,255,.24);border-radius:999px;color:rgba(255,255,255,.92);background:rgba(255,255,255,.07);box-shadow:0 16px 34px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.1);font-size:11px;font-weight:900;letter-spacing:.11em;text-transform:uppercase}.gateway-info-strip{position:relative;z-index:3;grid-column:1/-1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px clamp(18px,3vw,30px);min-height:72px;margin-top:calc(clamp(18px,3vw,34px)*-1);padding:16px clamp(18px,3vw,32px);border:1px solid rgba(141,240,255,.1);border-radius:0 0 8px 8px;color:rgba(219,239,244,.7);text-align:center;background:radial-gradient(circle at 50% 0%,rgba(105,232,255,.1),transparent 18rem),linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));box-shadow:0 24px 80px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(18px)}.gateway-info-strip span,.gateway-info-strip a{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:24px;color:inherit;font-size:12px;font-weight:750;white-space:nowrap}.gateway-info-strip a{color:rgba(245,251,255,.82)}.gateway-info-strip a svg{color:#8df0ff;opacity:.88}@media (max-width:900px){.gateway-home-brand{position:relative;top:auto;left:auto;margin:0 auto;transform:none}.gateway-hero{grid-template-columns:1fr;min-height:auto;padding-top:28px}.gateway-column{min-height:520px}.gateway-info-strip{margin-top:0;border-radius:8px}}@media (max-width:620px){.gateway-hero{gap:14px;min-height:auto;padding-top:96px}.gateway-column{min-height:auto;padding:28px 20px}.gateway-card-visual{width:86px;height:86px}.gateway-copy h2{font-size:clamp(32px,12vw,46px)}.gateway-primary{width:100%;justify-content:center}.gateway-info-strip{align-content:center;min-height:auto;padding:18px 14px}.gateway-info-strip span,.gateway-info-strip a{width:100%;white-space:normal}}
